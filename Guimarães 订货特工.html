<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Guimarães · 订货特工 — 桌面陪伴</title>

<!-- 设计系统 tokens + 全局样式 -->
<link rel="stylesheet" href="_ds/guimar-es-pixel-design-system-2bf0cf17-822c-4e79-95d4-4bf82dcf5cf6/styles.css">

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- 设计系统：图标 + 组件 bundle -->
<script src="_ds/assets/pixel-icons.js"></script>
<script src="_ds/guimar-es-pixel-design-system-2bf0cf17-822c-4e79-95d4-4bf82dcf5cf6/_ds_bundle.js"></script>

<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; overflow:hidden; }
  body{ font-family:var(--type-ui); color:var(--text-secondary); background:var(--ink-950); }

  /* ============ 桌面壁纸 ============ */
  .gx-desktop{
    position:fixed; inset:0; overflow:hidden;
    background:
      radial-gradient(1100px 700px at 78% 16%, rgba(84,230,160,0.10), transparent 60%),
      radial-gradient(900px 680px at 12% 88%, rgba(185,140,255,0.12), transparent 62%),
      linear-gradient(160deg, #161226 0%, #100c1c 55%, #0c0916 100%);
  }
  .gx-desktop::after{ /* 角落暗角 */
    content:""; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(120% 120% at 50% 40%, transparent 55%, rgba(8,5,16,0.55) 100%);
  }
  .gx-desktop[data-wp="grid"]::before{
    content:""; position:absolute; inset:0; pointer-events:none; opacity:.5;
    background-image:radial-gradient(rgba(150,140,186,0.16) 1px, transparent 1.5px);
    background-size:22px 22px;
  }
  .gx-desktop[data-wp="aurora"]{
    background:
      repeating-linear-gradient(125deg, rgba(84,230,160,0.05) 0 26px, transparent 26px 70px),
      repeating-linear-gradient(55deg, rgba(92,210,255,0.045) 0 30px, transparent 30px 80px),
      radial-gradient(900px 700px at 80% 10%, rgba(185,140,255,0.14), transparent 60%),
      linear-gradient(160deg, #18132a 0%, #100c1c 60%, #0b0814 100%);
  }

  /* ============ 顶部菜单栏 ============ */
  .gx-menubar{
    position:fixed; top:0; left:0; right:0; height:30px; z-index:3000;
    display:flex; align-items:center; justify-content:space-between; padding:0 14px;
    background:rgba(14,11,22,0.72); backdrop-filter:blur(6px);
    border-bottom:var(--border-w) solid var(--ink-800);
    font-size:var(--text-xs); color:var(--text-60);
  }
  .gx-menubar__left,.gx-menubar__right{ display:flex; align-items:center; gap:16px; }
  .gx-menubar__brand{ display:inline-flex; align-items:center; gap:6px; color:var(--green); font-weight:700; letter-spacing:.04em; }
  .gx-menubar__item:hover{ color:var(--text-90); cursor:default; }
  .gx-menubar__clock{ color:var(--text-90); font-family:var(--type-readout); font-size:var(--text-sm); letter-spacing:.04em; }

  /* ============ 被监测的「寿司订货系统」窗口 ============ */
  .gx-stage{ position:absolute; inset:30px 0 0 0; display:flex; align-items:center; justify-content:center; padding:48px 56px; }
  .gx-site{ width:min(620px, 88vw); box-shadow:var(--shadow-3); border:var(--border-w) solid var(--ink-600);
    background:var(--surface); transition:opacity .2s, filter .2s; }
  .gx-site.is-dim{ opacity:.72; filter:saturate(.85) brightness(.94); }
  .gx-site__bar{ display:flex; align-items:center; gap:10px; padding:7px 10px;
    background:var(--ink-800); border-bottom:var(--border-w) solid var(--ink-700); }
  .gx-site__lights{ display:flex; gap:5px; }
  .gx-site__lights i{ width:10px; height:10px; display:block; border:1px solid rgba(0,0,0,.4); }
  .gx-site__lights .l1{ background:var(--coral); } .gx-site__lights .l2{ background:var(--amber); } .gx-site__lights .l3{ background:var(--green); }
  .gx-site__url{ flex:1; display:flex; align-items:center; gap:6px; padding:4px 9px;
    font-family:var(--type-readout); font-size:var(--text-sm); color:var(--text-60); letter-spacing:.02em; }
  .gx-site__reload{ display:inline-flex; }
  .gx-site__body{ padding:16px 18px 20px; background:var(--surface); }
  .gx-site__head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .gx-site__title{ display:flex; align-items:center; gap:8px; font-size:var(--text-md); color:var(--text-90); }
  .gx-site__title b{ color:var(--white); letter-spacing:.03em; }
  .gx-site__crumb{ color:var(--text-40); font-size:var(--text-xs); }

  .gx-table{ width:100%; border-collapse:collapse; font-size:var(--text-sm); }
  .gx-table th{ text-align:left; padding:6px 10px; color:var(--text-40); font-weight:400;
    font-size:var(--text-xs); letter-spacing:.08em; text-transform:uppercase;
    border-bottom:var(--border-w) solid var(--ink-700); }
  .gx-table td{ padding:7px 10px; border-bottom:1px solid var(--ink-800); color:var(--text-90); }
  .gx-table tr.is-low td{ background:color-mix(in oklab, var(--orange) 9%, transparent); }
  .gx-table .mono{ font-family:var(--type-readout); font-size:var(--text-md); }
  .gx-table .dim{ color:var(--text-40); }
  .gx-pill{ display:inline-block; padding:1px 8px; font-size:var(--text-xs); border:var(--border-w) solid; letter-spacing:.04em; }
  .gx-pill--low{ color:var(--orange); border-color:var(--orange-deep); background:var(--orange-soft); }
  .gx-pill--ok{ color:var(--text-60); border-color:var(--ink-600); }

  /* ============ 监测状态条 ============ */
  .gx-monitor{ display:flex; align-items:center; gap:10px; padding:9px 11px; }
  .gx-monitor__dot{ width:9px; height:9px; flex:0 0 auto; background:var(--text-40); box-shadow:0 0 0 2px rgba(0,0,0,.3); }
  .gx-monitor__dot.is-on{ background:var(--green); box-shadow:0 0 8px 1px var(--green); animation:gx-pulse 1.6s steps(1,end) infinite; }
  @keyframes gx-pulse{ 0%,60%{opacity:1} 61%,100%{opacity:.35} }
  .gx-monitor__main{ flex:1; min-width:0; display:flex; flex-direction:column; gap:2px; }
  .gx-monitor__row1{ display:flex; align-items:center; gap:8px; }
  .gx-monitor__name{ color:var(--white); font-size:var(--text-sm); white-space:nowrap; }
  .gx-monitor__row2{ font-family:var(--type-readout); font-size:var(--text-sm); color:var(--text-40); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .gx-monitor__meta{ display:flex; flex-direction:column; align-items:flex-end; gap:1px; font-family:var(--type-readout); font-size:var(--text-sm); color:var(--text-60); white-space:nowrap; }
  .gx-monitor__meta b{ color:var(--text-90); }
  .gx-monitor__low b{ color:var(--orange); }
  .gx-monitor__sync{ color:var(--text-40); }

  /* ============ 展开面板（陪伴 widget） ============ */
  .gx-widget{ width:var(--widget-w); display:flex; flex-direction:column; }
  @keyframes gx-rise{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:translateY(0); } }
  .gx-widget__hd{ display:flex; align-items:center; gap:10px; padding:9px 10px 9px 12px;
    background:color-mix(in oklab, var(--accent) 8%, var(--surface-raised));
    border-bottom:var(--border-w) solid var(--border); }
  .gx-widget__avatar{ display:inline-flex; }
  .gx-widget__id{ flex:1; display:flex; flex-direction:column; min-width:0; }
  .gx-widget__name{ font-family:var(--type-brand); font-size:11px; color:var(--white); letter-spacing:.02em; line-height:1.3; }
  .gx-widget__call{ font-size:var(--text-2xs); color:var(--text-40); letter-spacing:.06em; }
  .gx-widget__tabs{ padding:6px 6px 0; }
  .gx-widget__body{ padding:10px; max-height:min(58vh, 520px); overflow-y:auto; }
  .gx-widget__body::-webkit-scrollbar{ width:8px; }
  .gx-widget__body::-webkit-scrollbar-thumb{ background:var(--ink-700); border:2px solid var(--surface); }

  .gx-tabpane{ display:flex; flex-direction:column; gap:12px; }
  .gx-tabpane__foot{ position:sticky; bottom:-10px; padding-top:2px; }
  .gx-rows{ display:flex; flex-direction:column; }
  .gx-vitals{ display:flex; flex-direction:column; gap:10px; }
  .gx-statgrid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .gx-paneLabel{ font-family:var(--type-ui); font-size:var(--text-2xs); letter-spacing:.12em;
    text-transform:uppercase; color:var(--text-40); margin-top:2px; }
  .gx-invrow{ display:flex; align-items:center; gap:8px; padding:8px 10px;
    background:var(--surface-inset); border:var(--border-w) solid var(--border); }
  .gx-invrow + .gx-invrow{ margin-top:2px; }
  .gx-invrow__name{ flex:1; font-size:var(--text-sm); color:var(--text-90); }
  .gx-invrow__sku{ font-family:var(--type-readout); font-size:var(--text-sm); color:var(--text-40); }
  .gx-invrow__stock{ font-family:var(--type-readout); font-size:var(--text-md); color:var(--orange); }

  /* ============ 收起态小人 ============ */
  .gx-sprblock{ display:flex; flex-direction:column; gap:10px; }
  .gx-spr{ position:relative; cursor:grab; touch-action:none; -webkit-user-select:none; user-select:none; }
  .gx-spr:active{ cursor:grabbing; }
  .gx-spr__float{ position:relative; display:inline-flex; flex-direction:column; align-items:center; }
  .gx-spr__float.is-live{ animation:gx-float 4.5s ease-in-out infinite; }
  @keyframes gx-float{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-5px); } }
  .gx-bounce{ animation:gx-bounce .76s var(--ease-out); }
  @keyframes gx-bounce{ 0%{transform:translateY(0)} 22%{transform:translateY(-12px)} 44%{transform:translateY(0)} 62%{transform:translateY(-6px)} 100%{transform:translateY(0)} }

  .gx-spr__base{ position:absolute; left:50%; bottom:-3px; transform:translateX(-50%);
    width:58px; height:14px; background:var(--ink-800); border:var(--border-w) solid var(--ink-600);
    box-shadow:0 6px 0 0 rgba(8,5,16,.5), inset 0 2px 0 0 rgba(255,255,255,.05);
    clip-path:polygon(8% 0,92% 0,100% 50%,92% 100%,8% 100%,0 50%); }
  .gx-spr__base::after{ content:""; position:absolute; inset:auto 0 -8px; height:6px;
    background:radial-gradient(ellipse at center, rgba(84,230,160,.30), transparent 70%); }
  .gx-spr__count{ position:absolute; top:-2px; right:-4px; min-width:20px; height:20px; padding:0 4px;
    display:inline-flex; align-items:center; justify-content:center;
    font-family:var(--type-readout); font-size:14px; color:#1a0f00;
    background:var(--orange); border:var(--border-w) solid var(--orange-deep);
    box-shadow:0 0 10px 0 rgba(255,157,74,.6); }
  .gx-spr__pill{ display:inline-flex; align-items:center; gap:6px; margin-top:6px; padding:3px 9px;
    font-size:var(--text-xs); color:var(--text-90); white-space:nowrap; }
  .gx-spr__pill b{ color:var(--white); font-family:var(--type-readout); font-size:var(--text-md); }
  .gx-spr__dot{ width:7px; height:7px; background:var(--text-40); }
  .gx-spr__dot.is-on{ background:var(--green); box-shadow:0 0 6px var(--green); }

  /* ============ 提示气泡 ============ */
  .gx-bubble{ position:relative; max-width:212px; text-align:left; cursor:pointer;
    padding:9px 11px; font-family:var(--type-ui); font-size:var(--text-sm); line-height:1.45;
    color:var(--white); background:var(--surface-raised);
    border:var(--border-w) solid var(--accent); box-shadow:var(--shadow-2), 0 0 14px 0 rgba(84,230,160,.18); }
  @keyframes gx-pop{ from{ opacity:0; transform:scale(.9) translateY(4px);} to{ opacity:1; transform:none; } }
  .gx-bubble__tail{ position:absolute; width:11px; height:11px; background:var(--surface-raised);
    border-right:var(--border-w) solid var(--accent); border-bottom:var(--border-w) solid var(--accent); }
  .gx-bubble.is-bottom .gx-bubble__tail{ bottom:-7px; transform:rotate(45deg); }
  .gx-bubble.is-top .gx-bubble__tail{ top:-7px; transform:rotate(225deg); }
  .gx-bubble.is-right .gx-bubble__tail{ right:22px; }
  .gx-bubble.is-left .gx-bubble__tail{ left:22px; }

  /* ============ Toast ============ */
  .gx-toast{ position:fixed; left:50%; top:54px; transform:translateX(-50%); z-index:5000;
    display:flex; align-items:center; gap:9px; padding:10px 16px;
    background:var(--surface-raised); border:var(--border-w) solid var(--accent);
    box-shadow:var(--shadow-2); color:var(--white); font-size:var(--text-sm); }

  @media (prefers-reduced-motion: no-preference){
    .gx-widget{ animation:gx-rise .18s var(--ease-out); }
    .gx-bubble{ animation:gx-pop .22s var(--ease-out); }
    .gx-toast{ animation:gx-pop .2s var(--ease-out); }
  }

  /* Tweaks 面板用 DS 字体 */
  .om-tweaks, .om-tweaks *{ font-family:var(--type-ui) !important; }
</style>
</head>
<body>
<div id="root"></div>

<!-- Tweaks 脚手架 -->
<script type="text/babel" src="app/tweaks-panel.jsx"></script>
<!-- 数据 -->
<script src="app/data.js"></script>
<!-- 组件 -->
<script type="text/babel" src="app/panels.jsx"></script>
<script type="text/babel" src="app/desktop.jsx"></script>
<script type="text/babel" src="app/companion.jsx"></script>

<!-- 主程序 -->
<script type="text/babel">
const { useState, useCallback } = React;

const THEMES = {
  '#54e6a0': ['#54e6a0','#1f7a52','#14352f'],   // 绿（默认）
  '#ffcb47': ['#ffcb47','#a9781a','#36301a'],   // 琥珀
  '#5cd2ff': ['#5cd2ff','#1d6f96','#142e3c'],   // 青
  '#b98cff': ['#b98cff','#6a44b0','#251f44'],   // 紫
};

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#54e6a0",
  "collapsedForm": "pedestal",
  "spriteScale": 5,
  "wallpaper": "grid",
  "showSite": true,
  "showMenubar": true
}/*EDITMODE-END*/;

const clone = (o) => JSON.parse(JSON.stringify(o));

function App(){
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [orders, setOrders] = useState(() => clone(GX_DATA.orders));
  const [tasks, setTasks]   = useState(() => clone(GX_DATA.tasks));
  const [toast, setToast]   = useState(null);

  const flash = useCallback((msg) => {
    setToast(msg);
    clearTimeout(window.__gxT); window.__gxT = setTimeout(() => setToast(null), 2200);
  }, []);

  const toggleOrder = useCallback((group, id) => {
    setOrders(prev => {
      const n = clone(prev);
      const it = n[group].find(o => o.id === id);
      if (it) it.done = !it.done;
      return n;
    });
  }, []);

  const toggleTask = useCallback((group, id) => {
    setTasks(prev => {
      const n = clone(prev);
      const it = n[group].find(o => o.id === id);
      if (it) it.status = it.status === 'done' ? 'todo' : 'done';
      return n;
    });
  }, []);

  const generate = useCallback(() => {
    const pending = [...orders.tomorrow, ...orders.week].filter(o => !o.done).length;
    flash('✓ 已生成订货单 · ' + pending + ' 项 · 已推送至寿司订货系统');
  }, [orders, flash]);

  const accentTri = THEMES[t.accent] || THEMES['#54e6a0'];
  const rootVars = {
    '--accent': accentTri[0],
    '--accent-deep': accentTri[1],
    '--accent-soft': accentTri[2],
    '--c-active': accentTri[0],
    '--c-energy': accentTri[0],
  };

  return (
    <div className="gx-desktop" data-wp={t.wallpaper} style={rootVars}>
      {t.showMenubar && <MenuBar agent={GX_DATA.agent} />}
      {t.showSite && (
        <div className="gx-stage" style={{ inset: t.showMenubar ? '30px 0 0 0' : '0' }}>
          <MonitoredSite data={GX_DATA} dim />
        </div>
      )}

      <Companion
        data={GX_DATA}
        orders={orders}
        tasks={tasks}
        scale={t.spriteScale}
        collapsedForm={t.collapsedForm}
        onToggleOrder={toggleOrder}
        onToggleTask={toggleTask}
        onGenerate={generate}
      />

      {toast && (
        <div className="gx-toast">
          <span style={{ color:'var(--accent)' }}>▸</span>{toast}
        </div>
      )}

      <TweaksPanel>
        <TweakSection label="小人形态" />
        <TweakRadio label="收起样式" value={t.collapsedForm}
          options={['pedestal','pill','bare']}
          onChange={(v)=>setTweak('collapsedForm', v)} />
        <TweakSlider label="小人尺寸" value={t.spriteScale} min={4} max={8} step={1}
          onChange={(v)=>setTweak('spriteScale', v)} />
        <TweakColor label="主题强调色" value={t.accent}
          options={Object.keys(THEMES)}
          onChange={(v)=>setTweak('accent', v)} />

        <TweakSection label="桌面场景" />
        <TweakRadio label="壁纸" value={t.wallpaper}
          options={['dusk','grid','aurora']}
          onChange={(v)=>setTweak('wallpaper', v)} />
        <TweakToggle label="显示被监测网站窗口" value={t.showSite}
          onChange={(v)=>setTweak('showSite', v)} />
        <TweakToggle label="显示顶部菜单栏" value={t.showMenubar}
          onChange={(v)=>setTweak('showMenubar', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#161226"/>
  <rect x="30" y="26" width="40" height="40" fill="#251f3d" stroke="#54e6a0" stroke-width="3"/>
  <rect x="40" y="40" width="8" height="8" fill="#54e6a0"/>
  <rect x="56" y="40" width="8" height="8" fill="#54e6a0"/>
  <rect x="44" y="54" width="12" height="4" fill="#54e6a0"/>
  <rect x="62" y="60" width="14" height="14" fill="#ffcb47" stroke="#a9781a" stroke-width="2"/>
</svg>
</template>
</body>
</html>
